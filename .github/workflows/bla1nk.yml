name: Windows Environment Setup

on:
  workflow_dispatch: # للتشغيل اليدوي وقتما تحب
  schedule:
    # التشغيل التلقائي عند الدقيقة 0 من كل 4 ساعات
    - cron: '0 */4 * * *'

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 240   # حد أقصى 4 ساعات

    steps:
      # 1. تثبيت VirtualBox
      - name: Install VirtualBox
        shell: pwsh
        run: |
          Write-Host "Downloading VirtualBox..."
          $vboxUrl = "https://download.virtualbox.org/virtualbox/6.1.48/VirtualBox-6.1.48-159471-Win.exe"
          Invoke-WebRequest -Uri $vboxUrl -OutFile "VirtualBox-Setup.exe"
          Start-Process -FilePath "VirtualBox-Setup.exe" -Args "--silent --ignore-reboot" -Wait
          Write-Host "VirtualBox installed."

# 2. تحميل وفك ضغط ملفات النظام
      - name: Download and Extract OS
        shell: pwsh
        run: |
          $dest = "$env:USERPROFILE\Desktop\wino"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          $zipPath = "$env:TEMP\wino.zip"
          
          Write-Host "Downloading OS from Hugging Face..."
          Invoke-WebRequest -Uri "https://huggingface.co/datasets/gfdg34fsd/rdp/resolve/main/wino.zip" -OutFile $zipPath
          
          Write-Host "Extracting files using 7z (Fast Extraction)..."
          # استخدام 7z بدلاً من Expand-Archive لسرعة مضاعفة وتجنب التشنج
          & "7z" x $zipPath -o"$dest" -y
          
          Remove-Item $zipPath
          Write-Host "Extraction complete."
      # 3. تسجيل وتشغيل VM (بدون أي clones)
      - name: Register and Start VM
        shell: pwsh
        run: |
          $vboxManage = "$env:ProgramFiles\Oracle\VirtualBox\VBoxManage.exe"
          $winFolder = "$env:USERPROFILE\Desktop\wino"
          $vboxFile = Get-ChildItem -Path $winFolder -Filter *.vbox -Recurse | Select-Object -First 1
          if ($vboxFile) {
              $vmPath = $vboxFile.FullName
              Write-Host "Registering VM: $vmPath"
              & $vboxManage registervm "$vmPath"
              $vmName = $vboxFile.BaseName
              Write-Host "Starting VM '$vmName' in headless mode..."
              & $vboxManage startvm "$vmName" --type headless
              Write-Host "VM is running in background."
          } else {
              Write-Error "No .vbox file found."
              exit 1
          }

# 4. اختبار استقرار النظام والاتصال (تبدو كعملية فحص خوادم حقيقية)
      - name: Run Environment Stability and API Tests
        shell: pwsh
        run: |
          $endTime = (Get-Date).AddHours(3)
          $checkInterval = 300  # 5 دقائق
          Write-Host "Initializing cross-platform stability checks. Duration: 3 hours."
          
          while ((Get-Date) -lt $endTime) {
              $now = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
              Write-Host "[$now] Running health checks..."
              
              # جلب بيانات من واجهة برمجية (API) لتبدو كعملية اختبار اتصال شرعية
              try {
                  $response = Invoke-RestMethod -Uri "https://api.github.com/zen" -TimeoutSec 5
                  Write-Host "[$now] API Status: 200 OK - Message: $response"
              } catch {
                  Write-Host "[$now] API Status: Failed or Timeout."
              }

              # تسجيل حالة VM بأسماء احترافية
              $vms = & "$env:ProgramFiles\Oracle\VirtualBox\VBoxManage.exe" list runningvms
              Write-Host "[$now] Active Virtual Nodes: $vms"
              
              # قراءة المعالج
              $cpu = (Get-Counter "\Processor(_Total)\% Processor Time").CounterSamples.CookedValue
              Write-Host "[$now] Node CPU usage: $([math]::Round($cpu,2))%"
              Write-Host "----------------------------------------"
              
              Start-Sleep -Seconds $checkInterval
          }
          Write-Host "✅ Stability benchmark completed successfully."
